name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push direct to HF (bypass history binary errors)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          rm -rf .git
          git init -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git lfs install
          git lfs track "*.mp4" "*.png" "*.jpg" "*.jpeg" "*.webm" "*.wav"
          git add .gitattributes
          git add .
          git commit -m "Automated sync from Github to HF"
          git push --force https://AUC6:$HF_TOKEN@huggingface.co/spaces/AUC6/Intelligent-Excuse-Generator main
